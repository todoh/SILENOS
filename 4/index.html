<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SILENOS 4</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
   <script src="tailwind.min.js"></script>
<link rel="stylesheet" href="fontawesome.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="intro-screen" class="w-full h-full flex flex-col justify-center px-8 md:px-24 relative bg-white overflow-hidden">
        <div class="absolute inset-0 pointer-events-none" style="background-image: linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px), linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 40px 40px;"></div>
        <div class="max-w-5xl z-10 relative animate-entry">
            <p class="font-mono text-xs text-gray-400 mb-6 tracking-widest uppercase">Sistema Operativo Web v4.0</p>
            <h1 class="font-display text-6xl md:text-9xl mb-8 leading-none tracking-tighter text-[#1a1a1a]">
                SILEN<span class="text-red-600">OS</span>
            </h1>
            <p class="max-w-xl text-lg md:text-xl font-light text-gray-600 leading-relaxed mb-10">
                Entorno de escritorio local minimalista.<br>
                <span class="text-sm font-mono text-gray-400">By Manuel Rodsua &copy; 2026</span>
            </p>
            <div class="flex flex-col items-start gap-4">
                <button id="btn-select-dir" class="border border-black bg-white px-6 py-3 font-mono text-sm hover:bg-black hover:text-white transition-all uppercase tracking-widest">
                    <i class="fa-solid fa-folder-open mr-2"></i> INICIAR SISTEMA (ABRIR DIR)
                </button>
                <p id="error-msg" class="text-red-600 font-mono text-[10px] hidden bg-red-50 px-2 py-1 border border-red-200">
                    ⚠️ ERROR: API no soportada. Use Chrome/Edge.
                </p>
            </div>
        </div>
        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-1/3 h-2/3 border-l border-gray-100 hidden lg:flex items-center justify-center opacity-30 pointer-events-none">
            <i class="fa-solid fa-cube text-9xl text-gray-100"></i>
        </div>
    </div>

    <div id="app-interface" class="swiss-grid w-full h-full" style="display: none;">
        
        <main id="drop-zone" class="cell bg-gray-50 relative overflow-hidden w-full h-full" style="grid-column: 1 / -1; grid-row: 1 / -1;">
            
            <aside id="file-tree-panel" class="hidden"></aside>
            <div id="file-tree" class="hidden"></div>

            <div id="bottom-bar-wrapper" class="absolute bottom-0 left-0 z-[9999] flex items-end justify-between p-2 w-full pointer-events-none">
                
                <div id="taskbar-container" class="flex flex-wrap items-end gap-1 flex-1 pointer-events-auto"></div>
                
                <div id="system-tray" class="flex items-end gap-1 pointer-events-auto relative ml-4">
                    <button id="btn-sys-programs" class="taskbar-item font-bold !bg-black !text-white !border-black hover:!bg-gray-800 transition-colors">[ PROG ]</button>
                    <button id="btn-sys-config" class="taskbar-item font-bold !bg-black !text-white !border-black hover:!bg-gray-800 transition-colors">[ CFG ]</button>
                    <div class="relative">
                        <button id="btn-sys-menu" class="taskbar-item font-bold !bg-black !text-white !border-black hover:!bg-gray-800 transition-colors m-0">[ SYS ]</button>
                        
                        <div id="sys-dropdown" class="hidden absolute bottom-[calc(100%+8px)] right-0 bg-white border border-black shadow-[0_4px_20px_-5px_rgba(0,0,0,0.2)] flex flex-col w-36 z-[10000]">
                            <button id="btn-menu-sort" class="text-left px-4 py-3 hover:bg-black hover:text-white text-[10px] font-mono border-b border-gray-100 uppercase transition-colors">Ordenar</button>
                            <button id="btn-menu-refresh" class="text-left px-4 py-3 hover:bg-black hover:text-white text-[10px] font-mono border-b border-gray-100 uppercase transition-colors">Refrescar</button>
                            <button id="btn-menu-mkdir" class="text-left px-4 py-3 hover:bg-black hover:text-white text-[10px] font-mono border-b border-gray-100 uppercase transition-colors">+ Directorio</button>
                            <button id="btn-menu-paste" class="text-left px-4 py-3 hover:bg-black hover:text-white text-[10px] font-mono uppercase transition-colors">Pegar</button>
                        </div>
                    </div>
                </div>

            </div>

            <div id="last-action" class="absolute top-4 right-4 typo-mono text-[10px] bg-black text-white p-2 hidden z-50">
                // ACTION LOGGED
            </div>
        </main>
        
    </div>

    <div id="rename-modal" class="hidden fixed inset-0 z-[100000] flex items-center justify-center bg-black/20 backdrop-blur-sm">
        <div class="bg-white border border-black p-6 w-full max-w-xs shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] animate-entry">
            <p class="typo-mono mb-4 text-xs font-bold">:: RENAME ENTRY</p>
            <input type="text" id="rename-input" class="w-full border border-black p-2 font-mono text-sm mb-6 focus:outline-none focus:bg-gray-50" placeholder="New filename..." autocomplete="off">
            <div class="flex justify-end gap-2">
                <button id="btn-cancel-rename" class="typo-mono border border-black px-4 py-2 hover:bg-black hover:text-white transition-colors text-xs">CANCEL</button>
                <button id="btn-confirm-rename" class="typo-mono border border-black bg-black text-white px-4 py-2 hover:bg-gray-800 transition-colors text-xs">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="sync-modal" class="hidden fixed inset-0 z-[100000] flex items-center justify-center bg-white/80 backdrop-blur-md">
        <div class="bg-white border border-black p-8 w-full max-w-md shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex flex-col items-center animate-entry">
            <i class="fa-solid fa-rotate fa-spin text-2xl mb-4"></i>
            <p class="typo-mono text-sm font-bold mb-2">SYSTEM UPDATE IN PROGRESS</p>
            <p id="sync-status" class="typo-mono text-xs text-gray-500 text-center mb-4">Initializing connection...</p>
            <div class="w-full bg-gray-100 h-1 mt-2 overflow-hidden">
                <div id="sync-bar" class="bg-black h-full w-0 transition-all duration-300"></div>
            </div>
            <p class="mt-4 text-[9px] text-gray-400 font-mono">DO NOT CLOSE THE BROWSER</p>
        </div>
    </div>

    <div id="toast" class="toast">NOTIFICACION</div>

    <script src="logic.js"></script>
    <script src="ui.js"></script>
    <script src="html-processor.js"></script>
    <script src="window-interaction.js"></script>
    <script src="window-system.js"></script>
    <script src="app-bridge.js"></script>
    
    <script src="fs-universe-core.js"></script>
    <script src="fs-universe-selection.js"></script>
    <script src="fs-universe-data.js"></script>
    <script src="fs-universe-physics.js"></script>
    <script src="fs-universe-draw.js"></script>
    <script src="fs-universe-input.js"></script>
    <script src="fs-universe-utils.js"></script>
    
    <script src="fs-core.js"></script>
    <script src="fs-actions.js"></script>
    <script src="config-core.js"></script>
    <script src="config-window.js"></script>
    <script src="config-boot.js"></script>

    <script src="book-studio-actions.js"></script>
    <script src="book-studio-export.js"></script>
    <script src="book-studio-core.js"></script>
    <script src="data-studio.js"></script>

    <script src="main.js"></script>
</body>
</html>
