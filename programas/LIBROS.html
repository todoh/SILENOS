    <style>
/* --- Empaquetado: style.css --- */
/* --- STYLE.CSS (Adaptación SILENOS 4 Ultra Minimal) --- */

* { margin: 0; padding: 0; box-sizing: border-box; }

#sidebar {
    width: 260px;
    min-width: 260px;
    height: 100vh;
    border-right: 1px solid var(--fin-border);
    display: flex;
    flex-direction: column;
}

#conversations-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.conv-item {
    font-size: 11px;
    padding: 8px 10px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid transparent;
    transition: all 0.2s ease;
    color: var(--fin-muted);
}

.conv-item:hover {
    background-color: var(--fin-hover);
    border-color: var(--fin-border);
    color: var(--fin-fg);
}

.conv-item.active {
    background-color: var(--fin-fg);
    color: var(--fin-bg);
}

.conv-del {
    font-size: 10px;
    opacity: 0;
    cursor: pointer;
    margin-left: 6px;
    flex-shrink: 0;
}

.conv-item:hover .conv-del { opacity: 0.8; }
.conv-item.active .conv-del { opacity: 1; color: var(--fin-bg); }

/* Main Area */
.msg {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
}

.msg.user {
    align-self: flex-end;
    text-align: right;
}

.msg-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fin-muted);
    margin-bottom: 6px;
}

.msg-text {
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--fin-fg);
}

/* Modals */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal {
    background: var(--fin-bg);
    border: 1px solid var(--fin-border-strong);
    width: 600px;
    max-width: 90vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    padding: 32px;
    box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
}

.modal-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--fin-border);
    padding-bottom: 16px;
}

/* Acciones y Widgets (SVGs, Libros) */
.doc-actions { 
    display: flex; 
    gap: 8px; 
    justify-content: flex-end; 
    margin-top: 12px; 
}

.book-status {
    font-size: 10px;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--fin-hover);
    border: 1px solid var(--fin-border);
    display: inline-block;
    text-transform: uppercase;
    color: var(--fin-muted);
}

.book-status.active {
    background: var(--fin-fg);
    color: var(--fin-bg);
}

.svg-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin-top: 16px;
}

.svg-item {
    border: 1px solid var(--fin-border);
    padding: 12px;
    display: flex;
    flex-direction: column;
    background: var(--fin-bg);
}

.svg-title {
    font-size: 10px;
    font-weight: 300;
    margin-bottom: 8px;
    text-transform: uppercase;
    text-align: center;
    border-bottom: 1px solid var(--fin-border);
    padding-bottom: 8px;
    color: var(--fin-fg);
}

.svg-preview {
    flex: 1;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Patrón sutil para SVGs */
    background-image: linear-gradient(45deg, var(--fin-hover) 25%, transparent 25%, transparent 75%, var(--fin-hover) 75%, var(--fin-hover)),
                      linear-gradient(45deg, var(--fin-hover) 25%, transparent 25%, transparent 75%, var(--fin-hover) 75%, var(--fin-hover));
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid var(--fin-border);
}

.svg-preview svg { 
    max-width: 100%; 
    max-height: 200px; 
    display: block; 
}

/* Override input button styles specific to this app */
#mode-selector .liquid-btn-secondary.active {
    background-color: var(--fin-fg) !important;
    color: var(--fin-bg) !important;
    border-color: var(--fin-fg) !important;
}
</style>

    <script>
// --- Empaquetado: main.js --- 
// --- MAIN.JS ---
const STORAGE = {
    CONVS: 'gchat_conversations',
    LOG: 'gchat_log',
    MODEL: 'gchat_model',
    PROVIDER: 'gchat_provider'
};

let state = {
    conversations: JSON.parse(localStorage.getItem(STORAGE.CONVS) || '[]'),
    log: JSON.parse(localStorage.getItem(STORAGE.LOG) || '[]'),
    activeConvId: null,
    selectedProvider: localStorage.getItem(STORAGE.PROVIDER) || 'deepseek',
    selectedModel: localStorage.getItem(STORAGE.MODEL) || 'deepseek',
    isLoading: false,
};

function save() {
    localStorage.setItem(STORAGE.CONVS, JSON.stringify(state.conversations));
    localStorage.setItem(STORAGE.LOG, JSON.stringify(state.log));
    localStorage.setItem(STORAGE.MODEL, state.selectedModel);
    localStorage.setItem(STORAGE.PROVIDER, state.selectedProvider);
}

// SANEAR ESTADO: Si cerramos la ventana de golpe mientras generaba, lo marcamos como pausado.
state.conversations.forEach(c => {
    c.messages.forEach(m => {
        if (m.mode === 'libro' && m.bookState && m.bookState.isGenerating) {
            m.bookState.isGenerating = false;
        }
        if (m.mode === 'svg' && m.svgState && m.svgState.isGenerating) {
            m.svgState.isGenerating = false;
        }
    });
});
save();

function getActiveConv() {
    return state.conversations.find(c => c.id === state.activeConvId);
}
</script>
    <script>
// --- Empaquetado: ui.js --- 
// --- UI.JS ---

// --- INIT MODELS & PROVIDERS ---
const provSel = document.getElementById('provider-select');
const modSel = document.getElementById('model-select');
const Models = window.AIModels || (window.parent && window.parent.AIModels);

const providers = [
    { id: 'deepseek', name: 'DeepSeek (Nativo)' },
    { id: 'gemini', name: 'Google Gemini (Nativo)' }, // <-- NUEVO PROVEEDOR
    { id: 'pollination', name: 'Pollinations (Nube)' },
    { id: 'ollama', name: 'Ollama (Local)' }
];

providers.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = p.name;
    if (p.id === state.selectedProvider) o.selected = true;
    provSel.appendChild(o);
});

async function updateModelList() {
    modSel.innerHTML = '';
    
    if (state.selectedProvider === 'deepseek') {
        const dsModels = [
            { id: 'deepseek', name: 'DeepSeek V4 Flash' },
            { id: 'deepseek-pro', name: 'DeepSeek V4 Pro' }
        ];
        dsModels.forEach(m => {
            const o = document.createElement('option');
            o.value = m.id;
            o.textContent = m.name;
            if (m.id === state.selectedModel) o.selected = true;
            modSel.appendChild(o);
        });
    } else if (state.selectedProvider === 'gemini') {
        // --- NUEVOS MODELOS GEMINI ---
        const geminiModels = [
            { id: 'gemma-4-26b-a4b-it', name: 'Gemma 4 26B' },
            { id: 'gemma-4-31b', name: 'Gemma 4 31B' },
            { id: 'gemma-3-27b', name: 'Gemma 3 27B' },
            { id: 'gemini-3.1-flash-lite-preview', name: 'Gemini 3.1 Flash Lite' }
        ];
        geminiModels.forEach(m => {
            const o = document.createElement('option');
            o.value = m.id;
            o.textContent = m.name;
            if (m.id === state.selectedModel) o.selected = true;
            modSel.appendChild(o);
        });
    } else if (state.selectedProvider === 'pollination') {
        if (Models && Models.cloudModels) {
            Models.cloudModels.forEach(m => {
                const o = document.createElement('option');
                o.value = m.id;
                o.textContent = m.name;
                if (m.id === state.selectedModel) o.selected = true;
                modSel.appendChild(o);
            });
        }
    } else if (state.selectedProvider === 'ollama') {
        modSel.innerHTML = '<option>Buscando en localhost:11434...</option>';
        try {
            const ollamaConfig = JSON.parse(localStorage.getItem('ollama_config')) || {};
            const url = ollamaConfig.url || 'http://localhost:11434';
            
            const response = await fetch(`${url}/api/tags`);
            if (!response.ok) throw new Error("Ollama no responde");
            
            const data = await response.json();
            
            if (data.models && data.models.length > 0) {
                modSel.innerHTML = '';
                data.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name;
                    if (m.name === state.selectedModel) opt.selected = true;
                    modSel.appendChild(opt);
                });
                
                // Asegurar selección si no hay match
                if (modSel.selectedIndex === -1 && modSel.options.length > 0) {
                    modSel.options[0].selected = true;
                    state.selectedModel = modSel.value;
                }
            } else {
                modSel.innerHTML = '<option disabled>Ollama activo pero sin modelos instalados.</option>';
            }
        } catch (error) {
            console.warn("Error escaneando Ollama:", error);
            modSel.innerHTML = '<option disabled>Error: ¿Ollama está en ejecución?</option>';
        }
    }
    
    updateMetaBar();
}

provSel.addEventListener('change', async () => {
    state.selectedProvider = provSel.value;
    await updateModelList();
    state.selectedModel = modSel.value; 
    save();
    updateMetaBar();
});

modSel.addEventListener('change', () => {
    state.selectedModel = modSel.value;
    save();
    updateMetaBar();
});

function updateMetaBar() {
    const provName = provSel.options[provSel.selectedIndex]?.text || state.selectedProvider;
    const modName = modSel.options[modSel.selectedIndex]?.text || state.selectedModel;
    document.getElementById('meta-model').textContent = `${provName} | ${modName}`;
}

updateModelList(); // Arranque inicial

// --- CONVERSATIONS SIDEBAR ---
function renderSidebar() {
    const list = document.getElementById('conversations-list');
    list.innerHTML = '';
    const sorted = [...state.conversations].reverse();
    
    sorted.forEach(conv => {
        const el = document.createElement('div');
        el.className = 'conv-item' + (conv.id === state.activeConvId ? ' active' : '');
        const title = conv.title || 'Sin título';
        el.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis">${title}</span><span class="conv-del" data-id="${conv.id}">✖</span>`;
        
        el.querySelector('span:first-child').addEventListener('click', () => {
            state.activeConvId = conv.id;
            renderSidebar();
            renderMessages();
        });
        
        el.querySelector('.conv-del').addEventListener('click', (e) => {
            e.stopPropagation();
            state.conversations = state.conversations.filter(c => c.id !== conv.id);
            if (state.activeConvId === conv.id) state.activeConvId = null;
            save();
            renderSidebar();
            renderMessages();
        });
        
        list.appendChild(el);
    });
}

document.getElementById('new-chat-btn').addEventListener('click', () => {
    const id = Date.now().toString();
    const conv = { id, title: 'Nueva conversación', messages: [], model: state.selectedModel, created: Date.now() };
    state.conversations.push(conv);
    state.activeConvId = id;
    save();
    renderSidebar();
    renderMessages();
});

// --- MESSAGES & UI RENDERER ---
function renderMessages() {
    const container = document.getElementById('chat-messages');
    const emptyState = document.getElementById('empty-state');
    const conv = getActiveConv();
    
    Array.from(container.children).forEach(c => {
        if (c.id !== 'empty-state') c.remove();
    });
    
    if (!conv || conv.messages.length === 0) {
        emptyState.style.display = 'flex';
        return;
    }
    
    emptyState.style.display = 'none';
    conv.messages.forEach(msg => appendMessageEl(msg));
    container.scrollTop = container.scrollHeight;
}

function appendMessageEl(msg) {
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.style.display = 'none';
    
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.id = 'msg-' + msg.id;
    
    const isDoc = msg.role === 'assistant' && (msg.mode === 'escaleta' || msg.mode === 'libro' || msg.mode === 'svg');
    div.className = `msg ${msg.role} ${isDoc ? 'document' : ''}`;
    div.innerHTML = buildMessageHTML(msg);
    
    container.appendChild(div);
    attachMessageEvents(div, msg);
    container.scrollTop = container.scrollHeight;
    return div;
}

function buildMessageHTML(msg) {
    const role = msg.role;
    const text = msg.content || '';
    const mode = msg.mode || 'chat';
    const isDoc = role === 'assistant' && (mode === 'escaleta' || mode === 'libro' || mode === 'svg');
    
    let html = `<div class="msg-label">${role === 'user' ? 'Tú' : (isDoc ? 'IA (' + mode.toUpperCase() + ')' : 'IA')}</div>`;
    
    if (mode === 'svg' && role === 'assistant') {
        html += buildSVGHTML(msg);
    } else if (mode === 'libro' && role === 'assistant') {
        html += buildLibroHTML(msg, text);
    } else if (isDoc) {
        html += `<div class="msg-text doc-content">${escHtml(text)}</div>
                 <div class="doc-actions">
                   <button class="liquid-btn-secondary copy-btn">Copiar</button>
                   <button class="liquid-btn-secondary download-btn">Descargar .txt</button>
                 </div>`;
    } else {
        html += `<div class="msg-text">${escHtml(text)}</div>`;
    }
    return html;
}

function buildLibroHTML(msg, text) {
    let html = '';
    const st = msg.bookState;
    if (!st) {
        return `<div class="msg-text doc-content">Generando contexto y analizando escaleta...</div>`;
    }
    
    const total = st.bloques ? st.bloques.length : 0;
    const current = st.currentIndex || 0;
    
    html += `<div class="book-status ${st.isGenerating ? 'active' : ''}">
               ${st.isGenerating ? `Escribiendo bloque ${current + 1} de ${total}...` : `Proceso detenido (${current}/${total})`}
             </div>`;
             
    html += `<div class="msg-text doc-content">${escHtml(text)}</div>`;
    
    html += `<div class="doc-actions">`;
    if (st.isGenerating) {
        html += `<button class="liquid-btn-secondary stop-btn">Pausar</button>`;
    } else if (current < total) {
        html += `<button class="liquid-btn-secondary resume-btn">Continuar</button>`;
    }
    html += `<button class="liquid-btn-secondary copy-btn">Copiar</button>
             <button class="liquid-btn-secondary download-btn">Descargar .txt</button>
             <button class="liquid-btn-secondary download-docx-btn">Descargar DOCX</button>
           </div>`;
    return html;
}

function buildSVGHTML(msg) {
    let html = '';
    const st = msg.svgState;
    
    if (!st) {
        return `<div class="msg-text doc-content">Analizando peticiones de vectores...</div>`;
    }
    
    const total = st.items ? st.items.length : 0;
    const current = st.currentIndex || 0;
    
    html += `<div class="book-status ${st.isGenerating ? 'active' : ''}">
               ${st.isGenerating ? `Generando SVG ${current + 1} de ${total}...` : `Proceso detenido (${current}/${total})`}
             </div>`;
             
    html += `<div class="doc-actions" style="margin-bottom: 16px;">`;
    if (st.isGenerating) {
        html += `<button class="liquid-btn-secondary stop-btn-svg">Pausar</button>`;
    } else if (current < total) {
        html += `<button class="liquid-btn-secondary resume-btn-svg">Continuar</button>`;
    }
    
    if (st.svgs && st.svgs.length > 0) {
        html += `<button class="liquid-btn-primary download-all-btn">Descargar Todos (SVG)</button>`;
    }
    html += `</div>`;
    
    if (st.svgs && st.svgs.length > 0) {
        html += `<div class="svg-grid">`;
        st.svgs.forEach((svg, index) => {
            html += `
            <div class="svg-item">
                <div class="svg-title" title="${escHtml(svg.title)}">${escHtml(svg.title)}</div>
                <div class="svg-preview">${svg.code}</div>
                <div class="svg-actions" style="justify-content: center;">
                    <button class="liquid-btn-secondary copy-svg-btn" data-idx="${index}">Copiar</button>
                    <button class="liquid-btn-secondary dl-svg-btn" data-idx="${index}">.SVG</button>
                    <button class="liquid-btn-secondary dl-png-btn" data-idx="${index}">.PNG</button>
                </div>
            </div>`;
        });
        html += `</div>`;
    }
    
    return html;
}

window.actualizarMensajeUI = function(msgId) {
    const el = document.getElementById('msg-' + msgId);
    if (!el) return;
    const conv = getActiveConv();
    const msg = conv.messages.find(m => m.id === msgId);
    if (!msg) return;
    
    el.innerHTML = buildMessageHTML(msg);
    attachMessageEvents(el, msg);
    
    const container = document.getElementById('chat-messages');
    if (container.scrollHeight - container.scrollTop < container.clientHeight + 200) {
        container.scrollTop = container.scrollHeight;
    }
}

function attachMessageEvents(div, msg) {
    const copyBtn = div.querySelector('.copy-btn');
    if (copyBtn) copyBtn.addEventListener('click', () => { navigator.clipboard.writeText(msg.content); copyBtn.textContent=' ¡Copiado!'; setTimeout(()=>copyBtn.textContent='Copiar',2000); });
    
    const dlBtn = div.querySelector('.download-btn');
    if (dlBtn) dlBtn.addEventListener('click', () => downloadText(msg.content, `${msg.mode}_${Date.now()}.txt`));
    
    const docxBtn = div.querySelector('.download-docx-btn');
    if (docxBtn) docxBtn.addEventListener('click', () => {
        if (typeof descargarDOCX === 'function') descargarDOCX(msg.content);
        else alert("El módulo export.docx.js no ha cargado correctamente.");
    });

    const stopBtn = div.querySelector('.stop-btn');
    if (stopBtn) stopBtn.addEventListener('click', () => {
        if (msg.bookState) msg.bookState.isGenerating = false;
        save(); window.actualizarMensajeUI(msg.id);
    });

    const resumeBtn = div.querySelector('.resume-btn');
    if (resumeBtn) resumeBtn.addEventListener('click', () => {
        if (window.procesarLibroProgressive) window.procesarLibroProgressive(msg.id, new Date().toISOString());
    });
    
    const stopSvgBtn = div.querySelector('.stop-btn-svg');
    if (stopSvgBtn) stopSvgBtn.addEventListener('click', () => {
        if (msg.svgState) msg.svgState.isGenerating = false;
        save(); window.actualizarMensajeUI(msg.id);
    });

    const resumeSvgBtn = div.querySelector('.resume-btn-svg');
    if (resumeSvgBtn) resumeSvgBtn.addEventListener('click', () => {
        if (window.procesarSVGProgressive) window.procesarSVGProgressive(msg.id, new Date().toISOString());
    });
    
    if (msg.mode === 'svg' && msg.svgState && msg.svgState.svgs) {
        div.querySelectorAll('.copy-svg-btn').forEach(btn => {

function escHtml(t) {

function downloadText(text, filename, type = 'text/plain;charset=utf-8') {
    const blob = new Blob([text], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

function downloadSvgAsPng(svgString, filename) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgString, "image/svg+xml");
    const svgEl = doc.documentElement;

    if (!svgEl.getAttribute('width')) svgEl.setAttribute('width', '1024');
    if (!svgEl.getAttribute('height')) svgEl.setAttribute('height', '1024');
    
    const finalSvg = new XMLSerializer().serializeToString(svgEl);
    const svgBlob = new Blob([finalSvg], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(svgBlob);
    
    const img = new Image();
    img.onload = function() {
        const canvas = document.createElement("canvas");
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);

        URL.revokeObjectURL(url);

        const pngUrl = canvas.toDataURL("image/png");
        const a = document.createElement("a");
        a.download = filename;
        a.href = pngUrl;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };
    img.onerror = function() {
        alert("Hubo un error convirtiendo el SVG a PNG. El código vectorial de la IA podría ser inválido.");
    };
    img.src = url;
}

    this.bar.style.width = '0%';
  }
};

// --- Empaquetado: ai.js --- 
// --- AI CORE AND CHAT MODE (ai.js) ---

async function fetchAI(promptText, history = [], onChunk = null) {
    const provider = state.selectedProvider;
    const selectedModelId = state.selectedModel;
    let attempts = 0;
    
    while (true) {
        try {
            if (provider === 'deepseek') {
                const aiSystem = window.DeepSeekAI || (window.parent && window.parent.DeepSeekAI);
                
                if (!aiSystem) throw new Error("Sistema nativo DeepSeekAI no encontrado. Ejecuta dentro de Silenos y asegúrate de que logic2.js esté cargado en tu index.html raíz.");
                
                let apiModel = selectedModelId;
                if (selectedModelId === 'deepseek') apiModel = 'deepseek-chat';
                if (selectedModelId === 'deepseek-pro') apiModel = 'deepseek-reasoner';
                const res = await aiSystem.generate({
                    prompt: promptText,
                    history: history,
                    model: apiModel,
                    temperature: 0.7
                });
                
                if (typeof res === 'string') return { text: res, usage: { total_tokens: 'N/A' } };
                return { text: res.text || res, usage: res.usage || { total_tokens: 'N/A' } };
                
            } else if (provider === 'gemini') {
                const aiSystem = window.GeminiOfficialAI || (window.parent && window.parent.GeminiOfficialAI);

                if (!aiSystem) throw new Error("Sistema nativo GeminiOfficialAI no encontrado. Asegúrate de que ai.gemini.js esté cargado.");

                const res = await aiSystem.generate({
                    prompt: promptText,
                    history: history,
                    model: selectedModelId,
                    temperature: 0.7
                });

                if (typeof res === 'string') return { text: res, usage: { total_tokens: 'N/A' } };
                return { text: res.text || res, usage: res.usage || { total_tokens: 'N/A' } };

            } else if (provider === 'ollama') {
                // --- NUEVO FLUJO: STREAMING NATIVO DIRECTO A LA API LOCAL ---
                let oldConfig = localStorage.getItem('ollama_config');
                const conf = JSON.parse(oldConfig) || { enabled: true, url: 'http://localhost:11434' };
                conf.enabled = true;
                conf.logic = selectedModelId;
                conf.narrative = selectedModelId;
                localStorage.setItem('ollama_config', JSON.stringify(conf));

                // System prompt limpio, sin directivas forzadas.
                let systemPrompt = "Eres un asistente experto.";

                try {
                    const url = conf.url || 'http://localhost:11434';
                    
                    const messages = [];
                    messages.push({ role: 'system', content: systemPrompt });
                    
                    if (history && history.length > 0) {
                        history.forEach(m => {
                            messages.push({ role: m.role, content: m.content });
                        });
                    }
                    messages.push({ role: 'user', content: promptText });

                    const response = await fetch(`${url}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: selectedModelId,
                            messages: messages,
                            stream: true,
                            think: false, // Propiedad inyectada según lo solicitado
                            options: { temperature: 0.7 }
                        })
                    });

                    if (!response.ok) throw new Error(`Error en Ollama local: ${response.statusText}`);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let fullText = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value, { stream: true });
                        const lines = chunk.split('\n').filter(l => l.trim() !== '');
                        
                        for (const line of lines) {
                            try {
                                const data = JSON.parse(line);
                                if (data.message && data.message.content) {
                                    const token = data.message.content;
                                    fullText += token;
                                    if (onChunk) onChunk(token);
                                }
                            } catch (e) {
                                // Fragmentos JSON cortados en medio de la trama de red, se ignoran hasta completarse
                            }
                        }
                    }

                    if (oldConfig) localStorage.setItem('ollama_config', oldConfig);
                    else localStorage.removeItem('ollama_config');

                    // LIMPIEZA POST-PROCESO: Si el modelo de razonamiento saca <think> por fuerza bruta, 
                    // lo extirpamos aquí de forma profunda y transparente para el usuario.
                    let finalText = fullText.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
                    if (finalText !== fullText && onChunk) {
                        onChunk('', finalText); // Bandera para sobreescribir el contenido UI
                    }

                    return { text: finalText, usage: { total_tokens: 'N/A' } };

                } catch (innerErr) {
                    if (oldConfig) localStorage.setItem('ollama_config', oldConfig);
                    else localStorage.removeItem('ollama_config');
                    throw innerErr;
                }

            } else {
                // --- PROVEEDORES CLOUD RESTANTES (POLLINATIONS) ---
                const Engine = window.SilenosAI || (window.parent && window.parent.SilenosAI);
                
                if (!Engine) throw new Error("Motor SilenosAI no encontrado.");
                
                let fullPrompt = "";
                if (history && history.length > 0) {
                    history.forEach(m => {
                        fullPrompt += `${m.role === 'user' ? 'Usuario' : 'Asistente'}: ${m.content}\n`;
                    });
                    fullPrompt += `Usuario: ${promptText}\n`;
                } else {
                    fullPrompt = promptText;
                }
                
                const resText = await Engine.generate({
                    prompt: fullPrompt,
                    system: "Eres un asistente experto.",
                    model: selectedModelId,
                    temperature: 0.7,
                    think: false
                });
                
                return { text: resText, usage: { total_tokens: 'N/A' } };
            }
        } catch (err) {
            if ((err.message.includes("429") || err.message.includes("503") || err.message.includes("fetch")) && attempts < 3) {
                attempts++;
                if (window.ProgressBar) ProgressBar.update(ProgressBar.currentPercent || 0, `Error 429/503. Reintentando (${attempts}/3) en 5s...`);
                await new Promise(resolve => setTimeout(resolve, 5000));
                continue;
            }
            throw err;
        }
    }
}

function extractJsonArray(text) {
    try {
        const start = text.indexOf('[');
        const end = text.lastIndexOf(']');
        if (start !== -1 && end !== -1) {
            const jsonStr = text.substring(start, end + 1);
            return JSON.parse(jsonStr);
        }
        return JSON.parse(text);
    } catch (e) {
        return text.split('\n').filter(l => l.trim().length > 5);
    }
}

async function send() {

    state.isLoading = true;
    document.getElementById('send-btn').disabled = true;
    
    try {
        const ts = new Date().toISOString();
        if (mode === 'chat') {
            const history = conv.messages.slice(0, -1);
            
            // PRE-RENDER DEL MENSAJE ASISTENTE (VACÍO) PARA RELLENARLO EN VIVO
            const astMsgId = 'ast_' + Date.now().toString() + Math.random().toString(36).substr(2,5);
            const astMsg = { id: astMsgId, role: 'assistant', content: '', mode: mode };
            conv.messages.push(astMsg);
            appendMessageEl(astMsg);
            
            // LLAMADA A LA IA CON CALLBACK DE CHUNKS
            const res = await fetchAI(rawText, history, (chunk, fullReplace) => {
                if (fullReplace !== undefined) {
                    astMsg.content = fullReplace; // Sobre-escribe si hubo limpieza profunda (ej. <think>)
                } else {

                }
                
                if (window.actualizarMensajeUI) {
                    window.actualizarMensajeUI(astMsgId);
                }
            });
            
            save();
            addLog({ status: 'ok', model: state.selectedModel, ts, prompt: rawText.slice(0, 80), tokens: res.usage });
            
        } else if (mode === 'escaleta') {
            const finalReply = await procesarEscaleta(rawText, ts);
            const astMsgId = 'ast_' + Date.now().toString() + Math.random().toString(36).substr(2,5);
            const astMsg = { id: astMsgId, role: 'assistant', content: finalReply, mode: mode };
            conv.messages.push(astMsg);
            save();
            appendMessageEl(astMsg);
            
        } else if (mode === 'libro') {
            const astMsgId = 'ast_' + Date.now().toString() + Math.random().toString(36).substr(2,5);
            const astMsg = {
                id: astMsgId,
                role: 'assistant',
                content: '',
                mode: 'libro',
                rawInput: rawText,
                bookState: null
            };
            conv.messages.push(astMsg);
            save();
            appendMessageEl(astMsg);
            await window.procesarLibroProgressive(astMsgId, ts);
            
        } else if (mode === 'svg') {
            const astMsgId = 'ast_' + Date.now().toString() + Math.random().toString(36).substr(2,5);
            const astMsg = {
                id: astMsgId,
                role: 'assistant',
                content: '',
                mode: 'svg',

                svgState: null
            };
            conv.messages.push(astMsg);

            appendMessageEl(astMsg);
            await window.procesarSVGProgressive(astMsgId, ts);
        }
    } catch (err) {
        if (window.ProgressBar) ProgressBar.hide();
        const errId = 'err_' + Date.now().toString() + Math.random().toString(36).substr(2,5);
        const errMsg = { id: errId, role: 'assistant', content: `Error Crítico: ${err.message}`, mode: mode };
        conv.messages.push(errMsg);
        save();
        appendMessageEl(errMsg);
        addLog({ status: 'error', model: state.selectedModel, ts: new Date().toISOString(), prompt: rawText.slice(0, 80), error: err.message });
    }
    
    state.isLoading = false;
    document.getElementById('send-btn').disabled = false;
}

document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); send(); }
});

// --- AI ESCALETA MODE (ai.escaleta.js) ---

async function procesarEscaleta(rawText, ts) {
    if (window.ProgressBar) ProgressBar.show("Identificando capítulos...");
    
    const promptCaps = `Actúa como un arquitecto narrativo. Basándote en la siguiente premisa, extrae y divide la historia en capítulos. Si la premisa especifica una cantidad exacta de capítulos (por ejemplo, "3 capítulos"), DEBES respetar esa cantidad estrictamente. Si no especifica cantidad, divídelo en capítulos lógicos. Devuelve ÚNICAMENTE un array de strings en formato JSON puro y válido (ej: ["Capítulo 1: El inicio", "Capítulo 2: El viaje"]). No incluyas absolutamente nada de texto antes ni después, ni uses bloques de código markdown.\n\nPremisa:\n${rawText}`;
    
    const resCaps = await fetchAI(promptCaps);
    const capitulos = extractJsonArray(resCaps.text);
    let escaletaCompleta = `# ESCALETA DEL LIBRO\n\n`;

    for (let i = 0; i < capitulos.length; i++) {
        // APLICAR DELAY DE 3 SEGUNDOS PARA EVITAR LÍMITE DE API
        if (i > 0) {
            if (window.ProgressBar) ProgressBar.update(ProgressBar.currentPercent || 10, "Esperando 3s por seguridad de API...");
            await new Promise(resolve => setTimeout(resolve, 3000));
        }

        const cap = capitulos[i];
        const pct = 10 + (85 * (i / capitulos.length));
        if (window.ProgressBar) {
            ProgressBar.update(pct, `Estructurando: ${cap.substring(0, 15)}...`);
            ProgressBar.currentPercent = pct;
        }
        
        const promptCap = `Actúa como un editor experto. Para el capítulo titulado "${cap}", genera una escaleta detallada dividida ESTRICTAMENTE en 3 partes: 1. Inicio, 2. Desarrollo, 3. Cierre. Contexto global de la historia:\n${rawText}`;
        const resPartes = await fetchAI(promptCap);
        
        escaletaCompleta += `## ${cap}\n${resPartes.text}\n\n---\n\n`;
        addLog({ status: 'ok', model: state.selectedModel, ts: new Date().toISOString(), prompt: `Escaleta Cap ${i+1}`, tokens: resPartes.usage });
    }

    if (window.ProgressBar) ProgressBar.update(100, "¡Escaleta completada!");
    setTimeout(() => { if (window.ProgressBar) ProgressBar.hide(); }, 1200);

    return escaletaCompleta;
}

window.procesarLibroProgressive = async function(msgId, ts) {
    const conv = getActiveConv();
    let msg = conv.messages.find(m => m.id === msgId);
    if (!msg) return;

    // Si es la primera vez que arranca este libro, generamos la estructura y la SINOPSIS GLOBAL
    if (!msg.bookState) {
        if (window.ProgressBar) ProgressBar.show("Analizando escaleta y creando estructura...");
        
        // 1. Extraer las partes secuenciales
        const promptPartes = `Actúa como director editorial. Analiza esta escaleta y sepárala en los bloques lógicos de redacción (ej. Parte 1 del Cap 1, Parte 2 del Cap 1, etc). Devuelve ÚNICAMENTE un array en formato JSON de strings que representen las secciones a escribir secuencialmente.\n\nEscaleta:\n${msg.rawInput}`;
        const resPartes = await fetchAI(promptPartes);
        const bloques = extractJsonArray(resPartes.text);

        // 2. Crear la Sinopsis Global (El informe escueto para no saturar la API)
        if (window.ProgressBar) ProgressBar.update(30, "Creando informe global de contexto...");
        const promptResumen = `Eres un editor de libros estructurando una "Biblia de contexto". Resume la siguiente escaleta en un informe muy escueto (máximo 400 palabras). Incluye: la trama principal, el arco de los protagonistas, el tono de la obra y el final previsto. Este texto servirá de guía global para la IA escritora.\n\nEscaleta Completa:\n${msg.rawInput}`;
        const resResumen = await fetchAI(promptResumen);

        msg.bookState = {
            bloques: bloques,
            resumenGlobal: resResumen.text,
            currentIndex: 0,
            isGenerating: false,
            lastChapterSeen: null, 
            chapterCounter: 0      
        };
        save();
        if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);
    }

    // Activar estado de generación
    msg.bookState.isGenerating = true;
    save();
    if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);

    const bloques = msg.bookState.bloques;

    try {
        for (let i = msg.bookState.currentIndex; i < bloques.length; i++) {
            if (!msg.bookState.isGenerating) break; 

            // APLICAR DELAY DE 3 SEGUNDOS PARA EVITAR LÍMITE DE API
            if (i > 0) {
                if (window.ProgressBar) ProgressBar.update(ProgressBar.currentPercent || 10, "Esperando 3s por seguridad de API...");
                await new Promise(resolve => setTimeout(resolve, 3000));
            }

            if (!msg.bookState.isGenerating) break; 

            const bloqueActual = bloques[i];
            const pct = 10 + (85 * (i / bloques.length));
            if (window.ProgressBar) {
                ProgressBar.update(pct, `Escribiendo parte ${i+1} de ${bloques.length}`);
                ProgressBar.currentPercent = pct;
            }
            
            // --- LÓGICA DE VENTANA DESLIZANTE (CONTEXTO SELECTIVO) ---
            const partesAnteriores = i > 0 ? bloques.slice(Math.max(0, i - 2), i).join(" -> ") : "Ninguna (es el inicio de la historia).";
            const partesSiguientes = i < bloques.length - 1 ? bloques.slice(i + 1, Math.min(bloques.length, i + 3)).join(" -> ") : "Ninguna (es el final de la historia).";
            
            // Extraemos las últimas palabras reales ya escritas para hacer un empalme perfecto
            let empalmeTexto = "";
            if (i > 0 && msg.content) {
                 const textoLimpio = msg.content.trim();
                 empalmeTexto = textoLimpio.slice(-800); 
            }

            const promptBloque = `Actúa como un escritor experto y talentoso. Escribe la redacción literaria profunda, final y detallada de la parte actual que se te indica. REGLAS ESTRICTAS: 1. NO ESCRIBAS TÍTULOS INFORMATIVOS (No pongas "Parte 3", "Desarrollo", "Capítulo 2", etc). Redacta directamente la historia (prosa, diálogos). 2. Sin introducciones ni notas, solo la obra pura. ${i > 0 ? '3. Continúa la narrativa de forma natural y fluida a partir del "Párrafo Anterior" que se te proporciona.' : ''}
            
            --- CONTEXTO DE LA OBRA ---
            SINOPSIS GLOBAL (El rumbo general):
            ${msg.bookState.resumenGlobal}
            
            TU MAPA LOCAL:
            - Lo que acaba de pasar: ${partesAnteriores}
            - LO QUE DEBES ESCRIBIR AHORA MISMO: "${bloqueActual}"
            - Lo que pasará después: ${partesSiguientes}
            
            ${i > 0 ? `--- PÁRRAFO ANTERIOR (Empalma tu redacción con esto) ---\n...${empalmeTexto}` : ''}`;
            
            const resTexto = await fetchAI(promptBloque);
            
            // --- LÓGICA DE SEGUIMIENTO MATEMÁTICO DE CAPÍTULOS ---
            let marcaCapitulo = "";
            const matchCap = bloqueActual.match(/Cap[ií]tulo\s*(\d+)/i);
            const isInicioBloque = bloqueActual.toLowerCase().includes("parte 1") || bloqueActual.includes("1.");

            if (matchCap) {
                const numCap = parseInt(matchCap[1], 10);
                if (msg.bookState.lastChapterSeen !== numCap) {
                    msg.bookState.lastChapterSeen = numCap;
                    msg.bookState.chapterCounter = numCap; 
                    marcaCapitulo = `## Capítulo ${numCap}\n\n`;
                }
            } else if (isInicioBloque) {
                msg.bookState.chapterCounter = (msg.bookState.chapterCounter || 0) + 1;
                msg.bookState.lastChapterSeen = msg.bookState.chapterCounter; 
                marcaCapitulo = `## Capítulo ${msg.bookState.chapterCounter}\n\n`;
            }

            // Añadir el texto al contenido general y actualizar el índice
            msg.content += `${marcaCapitulo}${resTexto.text}\n\n`;
            msg.bookState.currentIndex = i + 1;
            save();
            
            // Actualizar la interfaz en vivo
            if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);
            if (window.addLog) addLog({ status: 'ok', model: state.selectedModel, ts: new Date().toISOString(), prompt: `Redacción ${i+1}`, tokens: resTexto.usage });
        }

    } catch (err) {
        // Si hay error, lo pausamos de forma segura
        msg.bookState.isGenerating = false;
        save();
        if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);
        throw err; 
    }

    // Al finalizar (por éxito o pausa)
    msg.bookState.isGenerating = false;
    save();
    if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);

    if (msg.bookState.currentIndex >= bloques.length) {
        if (window.ProgressBar) ProgressBar.update(100, "¡Libro completado!");
        setTimeout(() => { if (window.ProgressBar) ProgressBar.hide(); }, 1200);
    }
}

window.procesarSVGProgressive = async function(msgId, ts) {
    const conv = getActiveConv();
    let msg = conv.messages.find(m => m.id === msgId);
    if (!msg) return;

    // Inicializar el estado de SVG si no existe
    if (!msg.svgState) {
        if (window.ProgressBar) ProgressBar.show("Analizando peticiones SVG...");
        
        // Separar por puntos y limpiar vacío
        const items = msg.rawInput.split('.').map(s => s.trim()).filter(s => s.length > 0);
        
        msg.svgState = {
            items: items,
            currentIndex: 0,
            isGenerating: false,
            svgs: [] // Aquí guardaremos los objetos {title, code}
        };
        save();
        if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);
    }

    // Activar estado de generación
    msg.svgState.isGenerating = true;
    save();
    if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);

    const st = msg.svgState;

    try {
        for (let i = st.currentIndex; i < st.items.length; i++) {
            if (!st.isGenerating) break; // Si pausó

            // DELAY DE 3 SEGUNDOS PARA EVITAR LÍMITE DE API
            if (i > 0) {
                if (window.ProgressBar) ProgressBar.update(ProgressBar.currentPercent || 10, "Esperando 3s por seguridad de API...");
                await new Promise(resolve => setTimeout(resolve, 3000));
            }

            if (!st.isGenerating) break; // Comprobación extra

            const itemActual = st.items[i];
            const pct = 10 + (85 * (i / st.items.length));
            if (window.ProgressBar) {
                ProgressBar.update(pct, `Generando SVG: ${itemActual.substring(0, 15)}...`);
                ProgressBar.currentPercent = pct;
            }
            
            const promptSvg = `Actúa como un diseñador e ilustrador experto. Genera el código para un gráfico vectorial escalable (SVG) basado en la siguiente descripción:\n"${itemActual}"\n\nREGLAS ESTRICTAS:\n1. Devuelve ÚNICAMENTE el código puro \`<svg>...</svg>\`.\n2. NO incluyas formato markdown (como \`\`\`xml o \`\`\`svg).\n3. NO des ninguna explicación ni introducciones.\n4. El SVG debe tener atributos de viewBox adecuados y estar listo para ser visualizado en una web.`;
            
            const resTexto = await fetchAI(promptSvg);
            
            // Parsear respuesta para forzar la obtención del SVG (por si la IA añade explicaciones o markdown)
            const svgMatch = resTexto.text.match(/<svg[\s\S]*?<\/svg>/i);
            const finalCode = svgMatch ? svgMatch[0] : `<svg viewBox="0 0 200 50"><text x="10" y="30" font-family="Arial" fill="red">Error al generar SVG para: ${itemActual.substring(0,10)}</text></svg>`;

            st.svgs.push({
                title: itemActual,
                code: finalCode
            });
            
            st.currentIndex = i + 1;
            save();
            
            // Actualizar UI en tiempo real
            if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);
            if (window.addLog) addLog({ status: 'ok', model: state.selectedModel, ts: new Date().toISOString(), prompt: `SVG: ${itemActual.substring(0,25)}`, tokens: resTexto.usage });
        }

    } catch (err) {
        // Si hay error, pausamos de forma segura
        st.isGenerating = false;
        save();
        if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);
        throw err; 
    }

    // Al finalizar
    st.isGenerating = false;
    save();
    if (window.actualizarMensajeUI) window.actualizarMensajeUI(msgId);

    if (st.currentIndex >= st.items.length) {
        if (window.ProgressBar) ProgressBar.update(100, "¡SVGs completados!");
        setTimeout(() => { if (window.ProgressBar) ProgressBar.hide(); }, 1200);
    }
}

// ─── EXPORT TO DOCX (export.docx.js) ─────────────────────────

async function descargarDOCX(texto) {
  // Generamos un archivo .html profesional con formato A5.
  // Este archivo incluye numeración automática secuencial de capítulos.

  const htmlStart = `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Manuscrito Final</title>
  <style>
    /* Configuración de página A5 para impresión y Word */
    @page {
      size: A5;
      margin: 20mm;
    }
    body {
      font-family: 'Georgia', serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #1a1a1a;
    }
    .page {
      background-color: white;
      width: 148mm;
      min-height: 210mm;
      padding: 25mm 20mm;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 40px;
      box-sizing: border-box;
      position: relative;
    }
    /* Estilo para "Capítulo X" */
    h1 {
      text-align: center;
      font-size: 16pt;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      margin-top: 50px;
      margin-bottom: 10pt;
      page-break-before: always;
    }
    /* Estilo para el nombre o subtítulo del capítulo */
    .chap-title {
      text-align: center;
      font-size: 14pt;
      font-style: italic;
      margin-bottom: 60px;
      color: #555;
    }
    p {
      text-align: justify;
      font-size: 11pt;
      line-height: 1.8;
      margin: 0 0 12pt 0;
      text-indent: 1.25cm; /* Sangría de primera línea clásica */
    }
    /* El primer párrafo después de un título no suele llevar sangría */
    h1 + p, .chap-title + p {
      text-indent: 0;
    }
    
    @media print {
      body { background: transparent; padding: 0; display: block; }
      .page { box-shadow: none; margin: 0; padding: 25mm 20mm; width: 100%; min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="page">
`;

  let innerHtml = "";
  const lineas = texto.split('\n');
  let chapterCounter = 0;
  
  for (let i = 0; i < lineas.length; i++) {
    const linea = lineas[i].trim();
    
    if (linea === "") {
      continue;
    } else if (linea.startsWith('## ')) {
      chapterCounter++;
      
      // Si ya hay contenido previo, cerramos la página actual y abrimos una nueva
      if (innerHtml !== "") {
        innerHtml += `  </div>\n  <div class="page">\n`;
      }
      
      // Limpiamos el texto para ver si hay un título específico aparte de "Capítulo X"
      let tituloOriginal = linea.replace(/^## /, '').trim();
      let subtitulo = "";
      
      // Si el texto contiene ":" (ej: "Capítulo 1: El Gran Viaje"), extraemos lo que hay después
      if (tituloOriginal.includes(':')) {
        subtitulo = tituloOriginal.split(':').slice(1).join(':').trim();
      } else {
        // Si el título no es simplemente la palabra "Capítulo X", lo tratamos como subtítulo
        const esSoloCap = /Cap[ií]tulo\s*\d+/i.test(tituloOriginal);
        if (!esSoloCap) {
          subtitulo = tituloOriginal;
        }
      }

      // Insertamos el Capítulo con su número secuencial
      innerHtml += `    <h1>Capítulo ${chapterCounter}</h1>\n`;
      
      // Si hemos extraído un nombre para el capítulo, lo ponemos debajo
      if (subtitulo) {
        innerHtml += `    <div class="chap-title">${subtitulo}</div>\n`;
      }
    } else {
      // Es un párrafo normal de la obra
      innerHtml += `    <p>${linea}</p>\n`;
    }
  }

  const htmlEnd = `  </div>\n</body>\n</html>`;
  const finalHtml = htmlStart + innerHtml + htmlEnd;
  
  // Creamos el archivo para descargar
  const blob = new Blob([finalHtml], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.download = `Manuscrito_A5_Completo_${Date.now()}.html`;
  document.body.appendChild(a);
  a.click();
  
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
