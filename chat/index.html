<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILENOS CHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-screen flex overflow-hidden">

    <aside class="w-56 bg-white flex flex-col justify-between shrink-0 select-none p-6">
        <div class="flex flex-col flex-1 min-h-0 space-y-6">
            
            <div class="flex flex-col space-y-1">
                <span class="text-xs font-bold tracking-tight text-black">SILEN<span class="text-xs font-bold tracking-tight text-red-500">OS</span> CHAT</span>
                <span id="connection-badge" class="text-[9px] text-neutral-400 font-mono"> </span>
            </div>

            <button id="btn-new-chat" class="text-left text-xs font-bold text-black hover:text-neutral-500 transition-colors cursor-pointer block p-0 bg-transparent">
                + nuevo chat
            </button>

            <div class="flex-1 flex flex-col min-h-0 pt-2">
                <div class="text-[9px] font-bold text-neutral-400 pb-2 uppercase tracking-wider font-mono">
                    recientes
                </div>
                <div id="chats-container" class="flex-1 overflow-y-auto space-y-2">
                    </div>
            </div>
        </div>

        <div class="pt-4">
            <button id="btn-open-settings" class="text-left text-xs font-medium text-neutral-400 hover:text-black transition-colors cursor-pointer bg-transparent p-0">
                configuración
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-white overflow-hidden relative">
        
        <header class="h-14 bg-white flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-6 relative">
                <div id="dropdown-trigger" class="flex items-center gap-1 text-xs text-neutral-500 hover:text-black cursor-pointer transition-colors select-none font-mono">
                    <span id="selected-model-text">cargando...</span>
                </div>
                
                <div id="dropdown-menu" class="hidden absolute left-0 top-8 bg-white rounded-none z-50 max-h-60 overflow-y-auto w-73">
                    <div id="dropdown-options" class="font-mono text-[11px]"></div>
                </div>

                <button id="btn-tool-image" class="text-xs font-semibold text-neutral-400 hover:text-black transition-colors cursor-pointer">
                    crear imagen
                </button>
            </div>
        </header>

        <div id="chat-history" class="flex-1 overflow-y-auto px-8 py-4 space-y-4">
            </div>

        <div class="px-8 pb-8 bg-white shrink-0">
            <div class="max-w-2xl mx-auto space-y-2">
                <div id="image-aspect-ratio-selector" class="hidden flex items-center gap-4 py-1 text-xs font-mono select-none text-neutral-400">
                    <span class="text-[9px] font-bold uppercase tracking-wider text-neutral-400">formato:</span>
                    <label class="flex items-center gap-1 cursor-pointer text-black font-semibold">
                        <input type="radio" name="aspect-ratio" value="1:1" checked class="accent-black"> cuadrado
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer text-neutral-400 hover:text-black transition-colors">
                        <input type="radio" name="aspect-ratio" value="9:16" class="accent-black"> vertical
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer text-neutral-400 hover:text-black transition-colors">
                        <input type="radio" name="aspect-ratio" value="16:9" class="accent-black"> horizontal
                    </label>
                </div>

                <div id="attachment-preview-area" class="hidden flex flex-wrap gap-2 py-1 bg-white">
                    </div>
                
                <div class="bg-white py-2 flex flex-col gap-2">
                    <textarea id="user-input" style="height: 170px;" rows="1" class="w-full bg-transparent text-sm text-black placeholder-neutral-300 resize-none leading-relaxed" placeholder="Escribir  aquí..."> </textarea>
                 
                    <div class="flex items-center justify-between pt-1">
                        <div class="flex items-center gap-4">
                            <button id="btn-attach" class="text-neutral-400 hover:text-black text-xs transition-colors cursor-pointer bg-transparent" title="Adjuntar Archivo">
                                adjuntar
                            </button>
                            <input type="file" id="file-uploader" class="hidden" multiple accept="*/*">
                        </div>
                        
                        <button id="btn-send" class="text-xs font-bold text-black hover:text-neutral-500 transition-colors cursor-pointer bg-transparent">
                            enviar
                        </button>
                    </div>
                </div>
                <div class="text-[9px] text-neutral-300 font-mono">
                 </div>
            </div>
        </div>
    </main>

    <div id="modal-settings" class="hidden fixed inset-0 bg-white/95 z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-xs font-bold uppercase font-mono tracking-wider text-black">ajustes</h2>
                <button id="btn-close-modal" class="text-neutral-400 hover:text-black transition-colors cursor-pointer text-xs">
                    cerrar
                </button>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <div class="flex justify-between items-center">
                        <label class="block text-[9px] font-bold text-neutral-400 uppercase tracking-wider font-mono">pollinations key:</label>
                        <button id="btn-login-pollinations" class="text-[9px] text-neutral-400 hover:text-black transition-all font-mono">
                            [login]
                        </button>
                    </div>
                    <input type="password" id="api-key-pollinations" placeholder="opcional..." class="font-mono text-xs bg-transparent text-black w-full py-1">
                </div>
                <div class="space-y-1">
                    <label class="block text-[9px] font-bold text-neutral-400 uppercase tracking-wider font-mono">gemini key:</label>
                    <input type="password" id="api-key-gemini" placeholder="AIzaSy..." class="font-mono text-xs bg-transparent text-black w-full py-1">
                </div>
                <div class="space-y-1">
                    <label class="block text-[9px] font-bold text-neutral-400 uppercase tracking-wider font-mono">endpoint ollama:</label>
                    <input type="text" id="endpoint-ollama" value="http://127.0.0.1:11434" class="font-mono text-xs bg-transparent text-black w-full py-1">
                </div>
            </div>
            <div class="flex justify-end pt-2">
                <button id="btn-save-settings" class="text-xs font-bold text-black hover:text-neutral-500 tracking-wider uppercase transition-all cursor-pointer bg-transparent">
                    guardar
                </button>
            </div>
        </div>
    </div>

    <canvas id="canvas-procesado" class="hidden"></canvas>
    <script type="module" src="pollinations.js"></script>
    <script type="module" src="gemini.js"></script>
    <script type="module" src="ollama.js"></script>
    <script type="module" src="modelos.js"></script>
    <script type="module" src="imagenes.js"></script>
    <script type="module" src="login.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
